services:
  mysql:
    image: mysql:8.0
    container_name: runspot-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: 1234
      MYSQL_DATABASE: runspot
      TZ: Asia/Seoul
    ports:
      - "3306:3306"
    volumes:
      - mysql-local-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p1234"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  redis:
    image: redis:7
    container_name: runspot-redis
    restart: always
    ports:
      - "6379:6379"

volumes:
  mysql-local-data:
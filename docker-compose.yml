services:
  mysql:
    image: mysql:8.0
    container_name: runspot-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: 0129
      MYSQL_DATABASE: runspot
      MYSQL_USER: runspot
      MYSQL_PASSWORD: runspot1234
      TZ: Asia/Seoul
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p0129"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  redis:
    image: redis:7
    container_name: runspot-redis
    restart: always
    ports:
      - "6379:6379"

  app:
    build: .
    container_name: runspot-app
    restart: always
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: docker

volumes:
  mysql-data: